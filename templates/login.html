<!DOCTYPE html>
<html>
<head>
    <title>Staff Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #1e293b; padding: 40px; border-radius: 16px; width: 320px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; }
        h2 { color: #3b82f6; margin-bottom: 5px; }
        p { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }
        input { width: 90%; padding: 12px; margin: 8px 0; border: 1px solid #334155; background: #0f172a; color: white; border-radius: 8px; outline: none; }
        input:focus { border-color: #3b82f6; }
        button { width: 98%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; transition: 0.3s; }
        button:hover { background: #2563eb; }
        .home-link { display: block; margin-top: 20px; color: #64748b; text-decoration: none; font-size: 13px; }
        .home-link:hover { color: white; }
        .error { color: #ef4444; font-size: 13px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Admin Portal</h2>
        <p>Please enter your credentials</p>
        
        <!-- UPDATED: Action points to /login -->
        <form action="/login" method="post">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button>SECURE LOGIN</button>
        </form>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <a href="/" class="home-link">← Back to Home Website</a>

        <div style="margin-top: 30px; padding-top: 20px; border-top: 1px solid #334155;">
            <p style="margin-bottom: 10px;">New Employee?</p>
            <form action="/register" method="post">
                <input type="text" name="new_user" placeholder="New Username" style="font-size: 12px; padding: 8px;">
                <input type="password" name="new_pass" placeholder="New Password" style="font-size: 12px; padding: 8px;">
                <button style="background: #10b981; padding: 8px; font-size: 12px;">CREATE ACCOUNT</button>
            </form>
        </div>
    </div>

</body>
</html>
