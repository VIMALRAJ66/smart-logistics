<!DOCTYPE html>
<html>
<head>
    <title>Live Truck Status</title>
    <style>
        body{
            margin:0;
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1f2937;
            width: 500px;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        h2 { color: #3b82f6; margin-bottom: 5px; }
        .subtitle { color: #9ca3af; margin-bottom: 30px; font-size: 14px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .box {
            background: #111827;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #374151;
        }

        .label { font-size: 12px; color: #9ca3af; text-transform: uppercase; }
        .value { font-size: 24px; font-weight: bold; color: white; margin-top: 5px; }

        .location-box {
            background: #3b82f6;
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
            color: white;
        }

        .alert-box {
            background: #ef4444;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-weight: bold;
        }
        .safe { background: #10b981; }

        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: #9ca3af;
            text-decoration: none;
            border: 1px solid #374151;
            padding: 10px 20px;
            border-radius: 30px;
            transition: 0.3s;
        }
        .back-btn:hover { background: white; color: black; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🚛 {{ truck[1] }}</h2>
        <div class="subtitle">Driver: {{ truck[2] }} | Type: {{ truck[3] }}</div>

        <!-- DATA GRID -->
        <div class="grid">
            <div class="box">
                <div class="label">Parcels</div>
                <div class="value">{{ s.parcels }}</div>
            </div>
            <div class="box">
                <div class="label">Total Weight</div>
                <div class="value">{{ s.weight }} kg</div>
            </div>
        </div>

        <!-- RANDOM LOCATION -->
        <div class="location-box">
            <div class="label" style="color: #bfdbfe;">Current Location</div>
            <div class="value" style="font-size: 18px;">📍 {{ s.location }}</div>
        </div>

        <!-- ALERTS -->
        {% if s.alert == "No Alerts" %}
            <div class="alert-box safe">✅ System Status: Normal</div>
        {% else %}
            <div class="alert-box">⚠️ ALERT: {{ s.alert }}</div>
        {% endif %}

        <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
    </div>

    <!-- Auto Refresh every 5 seconds to change random data -->
    <script>
        setTimeout(function(){ location.reload(); }, 5000);
    </script>

</body>
</html>
